# Puy-Lab Universal Pre-commit Template
# Python · C++ · TypeScript — auto-skips irrelevant hooks per project
default_install_hook_types: [pre-commit, commit-msg]

repos:
  # ── Universal (all projects) ───────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: detect-private-key
      - id: check-yaml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict

  # ── Python · naka-aqi_data (auto-skip if no .py files) ────────────
  - repo: https://github.com/psf/black
    rev: 26.5.0
    hooks:
      - id: black

  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["--skip", "B101,B310,B311,B110,B404,B603", "--severity-level", "medium", "--exclude", "./scripts"]
        types: [python]

  # ── C++ · naka-aqi (auto-skip if no .cpp/.h files) ────────────────
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.5
    hooks:
      - id: clang-format
        types_or: [c, c++]

  # ── TypeScript/JS · naka-clientPublic, prometheus-lms ─────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, css, markdown]

  # ── Commit message (all projects) ─────────────────────────────────
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.16.2
    hooks:
      - id: commitizen
        stages: [commit-msg]
